<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>원자 전자 배치 시뮬레이터</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    background: #f4f6fa;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 2rem 1rem;
  }
  .container {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    padding: 2rem;
    width: 100%;
    max-width: 540px;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    color: #1a2a4a;
    margin-bottom: 1.5rem;
    text-align: center;
    letter-spacing: -0.5px;
  }
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 1rem;
  }
  .control-card {
    background: #f0f4fa;
    border-radius: 10px;
    padding: 12px 14px;
  }
  .control-card label {
    display: block;
    font-size: 12px;
    color: #5a6a8a;
    margin-bottom: 6px;
  }
  .control-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  input[type=range] {
    flex: 1;
    accent-color: #2a75d0;
    cursor: pointer;
  }
  .val {
    font-size: 15px;
    font-weight: 600;
    color: #1a2a4a;
    min-width: 28px;
    text-align: right;
  }
  .charge-btns {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }
  .charge-btn {
    border: 1px solid #c8d4e8;
    background: #fff;
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 13px;
    cursor: pointer;
    color: #2a3a5a;
    transition: all 0.15s;
    font-family: inherit;
  }
  .charge-btn.active {
    background: #2a75d0;
    color: #fff;
    border-color: #2a75d0;
    font-weight: 600;
  }
  .charge-btn:hover:not(.active) {
    background: #e8f0fa;
  }
  .info-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .info-card {
    background: #f0f4fa;
    border-radius: 10px;
    padding: 8px 12px;
    flex: 1;
    min-width: 70px;
    text-align: center;
  }
  .info-label {
    font-size: 10px;
    color: #7a8aaa;
    margin-bottom: 2px;
  }
  .info-val {
    font-size: 15px;
    font-weight: 600;
    color: #1a2a4a;
  }
  .info-val.red { color: #c23b22; }
  .info-val.blue { color: #2a6fbb; }
  .canvas-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 10px;
  }
  canvas {
    border-radius: 12px;
    border: 1px solid #dde4f0;
    display: block;
  }
  .shell-info {
    display: flex;
    gap: 7px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .shell-badge {
    font-size: 12px;
    background: #f0f4fa;
    border-radius: 20px;
    padding: 3px 12px;
    color: #4a6088;
    border: 1px solid #dde4f0;
  }
  .footer {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 11px;
    color: #aab0c0;
  }
</style>
</head>
<body>
<div class="container">
  <h1>⚛️ 원자 및 이온의 전자 배치</h1>

  <div class="controls">
    <div class="control-card">
      <label>원자 번호 (양성자 수)</label>
      <div class="control-row">
        <input type="range" id="proton-slider" min="1" max="20" value="11">
        <span class="val" id="proton-val">11</span>
      </div>
    </div>
    <div class="control-card">
      <label>이온 전하</label>
      <div class="charge-btns" id="charge-btns"></div>
    </div>
  </div>

  <div class="info-row">
    <div class="info-card">
      <div class="info-label">원소 기호</div>
      <div class="info-val" id="sym-val">Na</div>
    </div>
    <div class="info-card">
      <div class="info-label">원소 이름</div>
      <div class="info-val" style="font-size:13px;" id="name-val">나트륨</div>
    </div>
    <div class="info-card">
      <div class="info-label">양성자 수</div>
      <div class="info-val" id="p-val">11</div>
    </div>
    <div class="info-card">
      <div class="info-label">전자 수</div>
      <div class="info-val" id="e-val">10</div>
    </div>
    <div class="info-card">
      <div class="info-label">이온 표기</div>
      <div class="info-val" id="ion-val">Na⁺</div>
    </div>
  </div>

  <div class="canvas-wrap">
    <canvas id="atom-canvas"></canvas>
  </div>

  <div class="shell-info" id="shell-info"></div>

  <div class="footer">1~20번 원소 지원</div>
</div>

<script>
const elements = [
  null,
  {sym:'H',  name:'수소'},    {sym:'He', name:'헬륨'},
  {sym:'Li', name:'리튬'},    {sym:'Be', name:'베릴륨'}, {sym:'B',  name:'붕소'},
  {sym:'C',  name:'탄소'},    {sym:'N',  name:'질소'},   {sym:'O',  name:'산소'},
  {sym:'F',  name:'플루오린'},{sym:'Ne', name:'네온'},
  {sym:'Na', name:'나트륨'},  {sym:'Mg', name:'마그네슘'},{sym:'Al', name:'알루미늄'},
  {sym:'Si', name:'규소'},    {sym:'P',  name:'인'},     {sym:'S',  name:'황'},
  {sym:'Cl', name:'염소'},    {sym:'Ar', name:'아르곤'},
  {sym:'K',  name:'칼륨'},    {sym:'Ca', name:'칼슘'}
];

const MAX_ELECTRONS = [2, 8, 8, 8];
const SHELL_R = [52, 96, 142, 190];
const ELECTRON_R = 10;
const NUCLEUS_R = 30;
const PADDING = 18; // extra padding around outermost orbit

let protons = 11;
let charge = 1;

function getElectronCount() { return Math.max(0, protons - charge); }

function distributeElectrons(total) {
  let shells = [], rem = total;
  for (let i = 0; i < 4; i++) {
    if (rem <= 0) break;
    let n = Math.min(rem, MAX_ELECTRONS[i]);
    shells.push(n);
    rem -= n;
  }
  return shells;
}

function superscript(n) {
  const map = {'0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸'};
  return String(Math.abs(n)).split('').map(c => map[c]||c).join('');
}

function ionLabel() {
  const el = elements[protons];
  if (!el) return '';
  if (charge === 0) return el.sym;
  const sign = charge > 0 ? '⁺' : '⁻';
  const mag = Math.abs(charge);
  return el.sym + (mag === 1 ? sign : superscript(mag) + sign);
}

function buildChargeButtons() {
  const container = document.getElementById('charge-btns');
  container.innerHTML = '';
  [-2, -1, 0, 1, 2, 3].forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'charge-btn' + (c === charge ? ' active' : '');
    btn.textContent = c === 0 ? '중성' : (c > 0 ? '+' + c : '' + c);
    btn.onclick = () => { charge = c; update(); };
    container.appendChild(btn);
  });
}

function resizeCanvas() {
  const canvas = document.getElementById('atom-canvas');
  const shells = distributeElectrons(getElectronCount());
  const numShells = Math.max(shells.length, 1);
  const outerR = SHELL_R[numShells - 1];
  // diameter + electron radius on both sides + padding + label area
  const size = (outerR + ELECTRON_R + PADDING) * 2 + 70;
  canvas.width = size;
  canvas.height = size;
  return {canvas, size, outerR};
}

function draw() {
  const shells = distributeElectrons(getElectronCount());
  const {canvas, size} = resizeCanvas();
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  // center: leave 70px at bottom for label
  const cx = W / 2;
  const cy = (H - 70) / 2 + 8;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  // Draw orbits
  for (let i = 0; i < shells.length; i++) {
    ctx.beginPath();
    ctx.arc(cx, cy, SHELL_R[i], 0, Math.PI * 2);
    ctx.strokeStyle = '#1a3a6b';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Draw electrons
  for (let s = 0; s < shells.length; s++) {
    const n = shells[s];
    const r = SHELL_R[s];
    for (let e = 0; e < n; e++) {
      const angle = (2 * Math.PI * e / n) - Math.PI / 2;
      const ex = cx + r * Math.cos(angle);
      const ey = cy + r * Math.sin(angle);

      ctx.beginPath();
      ctx.arc(ex, ey, ELECTRON_R, 0, Math.PI * 2);
      ctx.fillStyle = '#2a75d0';
      ctx.fill();
      ctx.strokeStyle = '#1a55a8';
      ctx.lineWidth = 1.2;
      ctx.stroke();

      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('−', ex, ey);
    }
  }

  // Draw nucleus
  ctx.beginPath();
  ctx.arc(cx, cy, NUCLEUS_R, 0, Math.PI * 2);
  ctx.fillStyle = '#e03010';
  ctx.fill();
  ctx.strokeStyle = '#a02008';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(protons + '+', cx, cy);

  // Labels below diagram
  const outerR = SHELL_R[shells.length - 1];
  const labelY = cy + outerR + ELECTRON_R + PADDING + 8;

  const el = elements[protons] || {sym:'?', name:'미지'};

  ctx.fillStyle = '#111111';
  ctx.font = 'bold 20px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(ionLabel(), cx, labelY);

  let fullName = el.name;
  if (charge !== 0) fullName += charge > 0 ? ' 양이온' : ' 음이온';

  ctx.fillStyle = '#444444';
  ctx.font = '13px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('(' + fullName + ')', cx, labelY + 26);
}

function update() {
  const electrons = getElectronCount();
  const el = elements[protons] || {sym:'?', name:'미지'};

  document.getElementById('proton-val').textContent = protons;
  document.getElementById('sym-val').textContent = el.sym;
  document.getElementById('name-val').textContent = el.name;
  document.getElementById('p-val').textContent = protons;
  document.getElementById('e-val').textContent = electrons;
  document.getElementById('ion-val').textContent = ionLabel();

  const ev = document.getElementById('e-val');
  ev.className = 'info-val' + (charge > 0 ? ' red' : charge < 0 ? ' blue' : '');

  buildChargeButtons();

  const shells = distributeElectrons(electrons);
  document.getElementById('shell-info').innerHTML = shells.map((n, i) =>
    `<span class="shell-badge">${['K','L','M','N'][i]}껍질: ${n}개</span>`
  ).join('');

  draw();
}

document.getElementById('proton-slider').addEventListener('input', function() {
  protons = +this.value;
  update();
});

update();
</script>
</body>
</html>
